<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Stock Signal Analyzer | AI-Powered Trading Tools</title>
    <meta name="description" content="Master the markets with the Stock Signal Analyzer. Get instant buy alerts and AI market analysis for only $14.95/month.">
    <meta name="keywords" content="stock signal analyzer, AI trading, swing trading tool, buy signals, stock market analysis">

    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0e14;
            --text-gray: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* Styling voor jouw afbeelding */
        .promo-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.3);
            margin-bottom: 30px;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .highlight {
            color: var(--neon-green);
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 30px;
        }

        .price-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid var(--neon-green);
        }

        .price-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fbbf24;
        }

        .cta-button {
            display: block;
            background: linear-gradient(135deg, #39ff14 0%, #22c55e 100%);
            color: #000;
            padding: 20px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.5rem;
            border-radius: 12px;
            text-transform: uppercase;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
        }

        .back-link:hover {
            border-bottom: 1px solid var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Trade smarter with Stock Signal Analyzer.jpg" alt="Stock Signal Analyzer" class="promo-img">

        <h1>Trade Smarter with <span class="highlight">AI Power</span></h1>
        
        <p class="description">Stop guessing and start winning. Use our advanced AI tool to find the most accurate trading setups in real-time.</p>

        <div class="price-box">
            <span class="price-text">UNLIMITED ACCESS: $14.95 / MONTH</span>
        </div>

        <a href="https://www.swingstocktraders.com/stock-signal-analyzer.html" class="cta-button">Access Analyzer Now</a>

        <br>
        <a href="https://www.swingstocktraders.com" class="back-link">Visit SwingStockTraders.com Official Site</a>
    </div>

</body>
</html>
